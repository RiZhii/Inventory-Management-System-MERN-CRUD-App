server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /products {
        proxy_pass http://inventory-backend:3001;
    }

    location /products/ {
        proxy_pass http://inventory-backend:3001;
    }

    location /insertproduct {
        proxy_pass http://inventory-backend:3001;
    }

    location /updateproduct {
        proxy_pass http://inventory-backend:3001;
    }

    location /deleteproduct {
        proxy_pass http://inventory-backend:3001;
    }
}